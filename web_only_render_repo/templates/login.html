{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-8">
        <div class="card shadow-lg border-0">
            <div class="card-body p-4 p-md-5">
                <h3 class="text-irctc mb-2">Login Portal</h3>
                <p class="text-muted mb-4">Passenger and TTE access</p>

                <form action="/login" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold small">USERNAME</label>
                        <input type="text" name="username" class="form-control form-control-lg" placeholder="Enter username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">PASSWORD</label>
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-irctc w-100 py-2">LOGIN</button>
                </form>

                <hr class="my-4">
                <p class="small text-muted mb-1">Demo Passenger: <strong>arun / rail123</strong> or <strong>meena / rail123</strong></p>
                <p class="small text-muted mb-0">Demo TTE: <strong>tte / admin123</strong></p>
                <div class="mt-3">
                    <a href="/signup" class="small">New passenger? Create account</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
