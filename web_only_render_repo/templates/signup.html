{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-8">
        <div class="card shadow-lg border-0">
            <div class="card-body p-4 p-md-5">
                <h3 class="text-irctc mb-2">Passenger Signup</h3>
                <p class="text-muted mb-4">Create account to book and track tickets</p>

                <form action="/signup" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold small">USERNAME</label>
                        <input type="text" name="username" class="form-control form-control-lg" placeholder="Choose username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">PASSWORD</label>
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="Create password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">CONFIRM PASSWORD</label>
                        <input type="password" name="confirm_password" class="form-control form-control-lg" placeholder="Confirm password" required>
                    </div>
                    <button type="submit" class="btn btn-irctc w-100 py-2">CREATE ACCOUNT</button>
                </form>

                <div class="mt-3">
                    <a href="/login" class="small">Already have an account? Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
