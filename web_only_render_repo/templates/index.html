{% extends "base.html" %}
{% block content %}
<div class="card shadow-lg border-0 mb-5" style="border-top: 6px solid var(--irctc-orange);">
    <div class="card-body p-4 p-md-5">
        <h2 class="text-irctc mb-4">BOOK TICKET</h2>
        <div class="row g-3">
            <div class="col-md-5">
                <label class="form-label fw-bold small">FROM</label>
                <input type="text" class="form-control form-control-lg bg-light" value="CHENNAI CENTRAL - MAS" readonly>
            </div>
            <div class="col-md-5">
                <label class="form-label fw-bold small">TO</label>
                <select class="form-select form-control-lg">
                    <option>BENGALURU - SBC</option>
                    <option>MANGALURU - MAQ</option>
                    <option>MYSORE - MYS</option>
                </select>
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-irctc w-100 py-2" onclick="showTrains()">SEARCH</button>
            </div>
        </div>
    </div>
</div>

<div id="train-results" style="display:none;">
    <h4 class="mb-4 text-muted">Found {{ trains|length }} Trains</h4>
    {% for train in trains %}
    <div class="card train-card mb-3 shadow-sm border-0">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <span class="badge bg-primary mb-2">{{ train.type }}</span>
                <h5 class="text-irctc mb-1">{{ train.name }} ({{ train.id }})</h5>
                <p class="mb-0 text-muted">{{ train.from }} ➔ {{ train.to }} | <strong>Departs: {{ train.time }}</strong></p>
            </div>
            <a href="/select_seat/{{ train.id }}" class="btn btn-outline-primary fw-bold">Select Seats</a>
        </div>
    </div>
    {% endfor %}
</div>

<script>
    function showTrains() { document.getElementById('train-results').style.display = 'block'; }
</script>
{% endblock %}
